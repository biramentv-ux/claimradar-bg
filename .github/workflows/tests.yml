name: Automated Tests

on:
  push:
    branches: [main]
    paths:
      - "**/*.py"
      - "tests/**"
      - "supabase/**"
      - "extension/**"
      - "requirements*.txt"
      - "pytest.ini"
      - ".github/workflows/tests.yml"
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DB_ENABLED: "0"
      RATE_LIMIT_ENABLED: "0"
      MONITORING_ENABLED: "1"
      REQUEST_LOG_ENABLED: "0"
      ADMIN_KEY: "test-admin-key"
      WHISPER_MODEL_SIZE: "tiny"
      WHISPER_DEVICE: "cpu"
      WHISPER_COMPUTE_TYPE: "int8"
      STREAM_LANGUAGE: "bg"
      PUBLIC_BASE_URL: "http://testserver"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Compile Python files
        run: |
          python -m py_compile app.py launch.py persistent_launch.py db_storage.py security_jobs.py jobs_api.py monitoring.py search_providers.py scripts/package_extension.py

      - name: Run pytest
        run: pytest

      - name: Build extension package smoke test
        run: python scripts/package_extension.py

      - name: Upload extension test package
        uses: actions/upload-artifact@v4
        with:
          name: test-extension-package
          path: dist/*.zip
          if-no-files-found: error
