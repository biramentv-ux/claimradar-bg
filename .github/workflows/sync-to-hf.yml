name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install hf CLI
        run: |
          curl -LsSf https://hf.co/cli/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Upload to Hugging Face Space
        env:
          HF_OIDC_RESOURCE: spaces/DyrakArmy/claimradar-bg
        run: |
          hf upload DyrakArmy/claimradar-bg . . --repo-type space --exclude ".git/*" --exclude ".github/*" --commit-message "Sync from GitHub ${GITHUB_SHA::7}"
