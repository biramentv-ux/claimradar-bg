<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClaimRadar BG</title>
  <style>
    body{width:350px;margin:0;background:#020617;color:#e5e7eb;font-family:Arial,sans-serif}
    .wrap{padding:16px;background:radial-gradient(circle at 20% 0,rgba(34,211,238,.18),transparent 35%),radial-gradient(circle at 90% 20%,rgba(168,85,247,.18),transparent 35%)}
    h1{font-size:18px;margin:0 0 6px;color:#fff}p{font-size:12px;line-height:1.4;color:#cbd5e1}.kicker{font-size:10px;color:#67e8f9;letter-spacing:.14em;text-transform:uppercase;font-weight:800}.btn{width:100%;border:1px solid rgba(34,211,238,.25);background:rgba(15,23,42,.7);color:#e0f2fe;border-radius:12px;padding:10px;margin-top:8px;cursor:pointer}.btn.primary{border:0;background:linear-gradient(90deg,#0891b2,#7c3aed);color:#fff}.note{font-size:11px;color:#94a3b8;margin-top:12px}label{display:block;font-size:11px;color:#94a3b8;margin-top:10px}input{box-sizing:border-box;width:100%;border:1px solid rgba(34,211,238,.25);background:rgba(2,6,23,.7);color:#e5e7eb;border-radius:10px;padding:8px;margin-top:4px}.status{font-size:11px;color:#67e8f9;margin-top:8px;min-height:14px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="kicker">HF ready realtime</div>
    <h1>ClaimRadar BG</h1>
    <p>Overlay за YouTube/live дебати + tab audio capture към Hugging Face word-by-word realtime backend.</p>
    <div class="grid">
      <button class="btn primary" id="openApp">App</button>
      <button class="btn" id="openYouTube">YouTube</button>
    </div>
    <label>Realtime WebSocket backend</label>
    <input id="backendUrl" placeholder="wss://dyrakarmy-claimradar-bg.hf.space/ws/realtime" />
    <label>Audio chunk milliseconds</label>
    <input id="chunkMs" type="number" min="600" max="8000" step="100" />
    <button class="btn" id="saveBackend">Запази realtime backend</button>
    <div class="status" id="status"></div>
    <p class="note">След като Space-ът е Running, отвори YouTube/live страница и натисни „Realtime“ в overlay панела. На free CPU първото пускане може да е бавно.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
