<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClaimRadar BG</title>
  <style>
    body{width:320px;margin:0;background:#020617;color:#e5e7eb;font-family:Arial,sans-serif}
    .wrap{padding:16px;background:radial-gradient(circle at 20% 0,rgba(34,211,238,.18),transparent 35%),radial-gradient(circle at 90% 20%,rgba(168,85,247,.18),transparent 35%)}
    h1{font-size:18px;margin:0 0 6px;color:#fff}p{font-size:12px;line-height:1.4;color:#cbd5e1}.kicker{font-size:10px;color:#67e8f9;letter-spacing:.14em;text-transform:uppercase;font-weight:800}.btn{width:100%;border:1px solid rgba(34,211,238,.25);background:rgba(15,23,42,.7);color:#e0f2fe;border-radius:12px;padding:10px;margin-top:8px;cursor:pointer}.btn.primary{border:0;background:linear-gradient(90deg,#0891b2,#7c3aed);color:#fff}.note{font-size:11px;color:#94a3b8;margin-top:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="kicker">Live overlay v1.0</div>
    <h1>ClaimRadar BG</h1>
    <p>Футуристичен overlay за YouTube/live дебати и публични страници. Работи локално в браузъра и насочва към източници.</p>
    <button class="btn primary" id="openApp">Отвори публичното приложение</button>
    <button class="btn" id="openYouTube">Тествай в YouTube</button>
    <p class="note">Ако overlay-ът не се вижда, презареди страницата след включване на extension-а.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
